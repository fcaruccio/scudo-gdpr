<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250" width="772" height="250">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="shieldGradBanner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222244"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="772" height="250" fill="url(#bgGrad)"/>

  <!-- Subtle decorative line at bottom -->
  <rect x="0" y="244" width="772" height="6" fill="#0f9b58" opacity="0.7"/>

  <!-- Shield icon (scaled down, positioned left) -->
  <g transform="translate(60, 30) scale(0.74)">
    <!-- Shield shape -->
    <path d="M128 20
      C128 20 48 44 48 44
      C48 44 44 48 44 48
      L44 120
      C44 168 72 210 128 236
      C184 210 212 168 212 120
      L212 48
      C212 44 208 44 208 44
      C208 44 128 20 128 20Z"
      fill="url(#shieldGradBanner)"
      stroke="rgba(255,255,255,0.1)"
      stroke-width="2"/>
    <!-- Inner highlight -->
    <path d="M128 34
      C128 34 58 55 58 55
      L58 118
      C58 160 82 198 128 222
      C174 198 198 160 198 118
      L198 55
      C198 55 128 34 128 34Z"
      fill="none"
      stroke="rgba(255,255,255,0.06)"
      stroke-width="1.5"/>
    <!-- Checkmark -->
    <polyline
      points="92,132 116,156 168,100"
      fill="none"
      stroke="#0f9b58"
      stroke-width="16"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- "Scudo" text -->
  <text x="310" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="1">Scudo</text>

  <!-- Tagline -->
  <text x="312" y="158" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#ffffff" opacity="0.6">Compliance GDPR leggera. Davvero.</text>

  <!-- Subtle version / accent dot -->
  <circle cx="537" cy="100" r="4" fill="#0f9b58" opacity="0.8"/>
</svg>
